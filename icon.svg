<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1220"/>
      <stop offset="0.62" stop-color="#141F34"/>
      <stop offset="1" stop-color="#1B2A42"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12333F"/>
      <stop offset="1" stop-color="#07141D"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8EF0B6"/>
      <stop offset="0.55" stop-color="#7FE8A9"/>
      <stop offset="1" stop-color="#8EA0E8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- night sky + sea -->
  <rect x="0" y="0" width="512" height="512" fill="url(#sky)"/>
  <rect x="0" y="360" width="512" height="152" fill="url(#sea)"/>

  <!-- bokeh stars -->
  <g fill="#EAF4FF">
    <circle cx="86" cy="96" r="3.4" opacity="0.85"/>
    <circle cx="150" cy="150" r="2.1" opacity="0.6"/>
    <circle cx="418" cy="104" r="3.0" opacity="0.8"/>
    <circle cx="452" cy="176" r="2.0" opacity="0.55"/>
    <circle cx="360" cy="70" r="2.4" opacity="0.7"/>
    <circle cx="60" cy="188" r="2.2" opacity="0.6"/>
    <circle cx="256" cy="62" r="2.6" opacity="0.75"/>
  </g>

  <!-- the Mokulua islets on the horizon: Moku Nui (larger, left), Moku Iki (smaller, right) -->
  <path d="M150 360 Q212 300 274 360 Z" fill="#0A1420"/>
  <path d="M292 360 Q330 326 368 360 Z" fill="#0A121C"/>

  <!-- aurora reflection shimmer on the water, under the ribbon's crest -->
  <g opacity="0.5">
    <rect x="236" y="360" width="10" height="86" fill="#7FE8A9" opacity="0.20"/>
    <rect x="258" y="360" width="8" height="72" fill="#8EA0E8" opacity="0.16"/>
    <rect x="276" y="360" width="9" height="64" fill="#7FE8A9" opacity="0.14"/>
  </g>

  <!-- the fat-tailed curve, reborn as a glowing aurora ribbon (same recognizable silhouette) -->
  <g>
    <path d="M64 296 C100 302 140 304 176 297 C210 288 232 184 256 176 C280 184 302 288 336 297 C372 304 412 302 448 296"
          fill="none" stroke="url(#aurora)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" opacity="0.55" filter="url(#glow)"/>
    <path d="M64 296 C100 302 140 304 176 297 C210 288 232 184 256 176 C280 184 302 288 336 297 C372 304 412 302 448 296"
          fill="none" stroke="url(#aurora)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M64 296 C100 302 140 304 176 297 C210 288 232 184 256 176 C280 184 302 288 336 297 C372 304 412 302 448 296"
          fill="none" stroke="#D8FBEA" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>
</svg>
